name: Sync K8S Docs to Notion

on:
  push:
    branches:
      - main
    paths:
      - "docs/install_configuration.md"
      - "docs/scripts.md"
      - "docs/troubleshooting.md"
      - ".github/scripts/sync-k8s-docs-to-notion.js"
      - ".github/workflows/sync-k8s-docs-to-notion.yml"

jobs:
  sync-k8s-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Notion SDK
        run: npm install @notionhq/client@2.2.15

      - name: Sync K8S docs to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CODE_DATABASE_ID: ${{ secrets.NOTION_K8S_DATABASE_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: node .github/scripts/sync-k8s-docs-to-notion.js